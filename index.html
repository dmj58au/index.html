<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GolfMate">
<meta name="theme-color" content="#1a6b3a">
<title>GolfMate</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --green:#1a6b3a; --green-light:#2d9653; --green-dark:#0f3d20;
  --gold:#c9a84c; --gold-light:#e8c97a;
  --dark:#111810; --mid:#2a3328; --card:#1c2a1e; --card2:#243028;
  --text:#e8ede6; --text-muted:#8fa088;
  --red:#c0392b; --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}
.screen{display:none;flex-direction:column;height:100vh;overflow:hidden}
.screen.active{display:flex}
.hdr{background:var(--green-dark);padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid rgba(201,168,76,.25)}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--gold)}
.hdr-sub{font-size:12px;color:var(--text-muted);margin-top:1px}
.back-btn{background:none;border:1px solid rgba(255,255,255,.2);color:var(--text);padding:6px 12px;border-radius:20px;font-size:13px;cursor:pointer}
.body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.home-hero{text-align:center;padding:20px 0 16px}
.home-logo{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:4px;color:var(--gold);line-height:1}
.home-tagline{font-size:12px;color:var(--text-muted);margin-top:4px;letter-spacing:1px;text-transform:uppercase}
.home-btn{display:block;width:100%;padding:16px;border-radius:var(--r);font-size:16px;font-weight:600;cursor:pointer;border:none;margin-bottom:12px;font-family:'DM Sans',sans-serif;transition:opacity .15s}
.home-btn:active{opacity:.8}
.btn-primary{background:var(--green);color:white}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid rgba(255,255,255,.12)}
.btn-gold{background:var(--gold);color:var(--dark)}
.btn-danger{background:var(--red);color:white}
.section-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin:20px 0 10px}
.card{background:var(--card);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;border:1px solid rgba(255,255,255,.06)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.field input,.field select{width:100%;background:var(--card);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:var(--text);font-size:16px;padding:12px 14px;font-family:'DM Sans',sans-serif;outline:none;appearance:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--green-light)}
.pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.pill{padding:8px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.18);background:transparent;color:var(--text);font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.pill.active{background:var(--green);border-color:var(--green);color:white;font-weight:500}
.pill:active{opacity:.8}
.player-avatar{width:36px;height:36px;border-radius:50%;background:var(--green-dark);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold);flex-shrink:0}
.hole-header{background:var(--green-dark);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid rgba(201,168,76,.15)}
.hole-num{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--gold);line-height:1}
.hole-meta{font-size:12px;color:var(--text-muted)}
.hole-nav{display:flex;gap:8px}
.nav-btn{width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:transparent;color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nav-btn.finish{background:var(--gold);color:var(--dark);border-color:var(--gold);font-size:14px;font-weight:600;width:auto;padding:0 14px;border-radius:20px;font-family:'DM Sans',sans-serif}
.score-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.score-row:last-child{border-bottom:none}
.score-player{flex:1}
.score-name{font-size:14px;font-weight:500}
.score-running{font-size:11px;color:var(--text-muted);margin-top:1px}
.stepper{display:flex;align-items:center}
.step-btn{width:44px;height:44px;border-radius:50%;border:none;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:300;transition:transform .1s}
.step-btn:active{transform:scale(.9)}
.step-minus{background:var(--card2);color:var(--text)}
.step-plus{background:var(--green);color:white}
.step-val{width:52px;text-align:center;font-size:26px;font-weight:600;font-family:'Bebas Neue',sans-serif}
.step-val.eagle{color:#e8c97a}
.step-val.birdie{color:#5dbb7a}
.step-val.par-score{color:var(--text)}
.step-val.bogey{color:#e07b3a}
.step-val.double{color:var(--red)}
.step-val.worse{color:#8b2020}
.score-pts{width:36px;text-align:right;font-size:14px;font-weight:600;color:var(--gold)}
.progress-bar{height:3px;background:var(--card);flex-shrink:0}
.progress-fill{height:100%;background:var(--gold);transition:width .3s ease}
.lb-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
.lb-pos{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--text-muted);width:28px}
.lb-pos.gold{color:var(--gold)}
.lb-pos.silver{color:#aaa}
.lb-pos.bronze{color:#cd7f32}
.lb-name{flex:1;font-size:16px;font-weight:500}
.lb-scores{text-align:right}
.lb-main{font-size:20px;font-weight:600}
.lb-sub{font-size:12px;color:var(--text-muted)}
.sc-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.sc-table{border-collapse:collapse;width:100%;min-width:520px;font-size:13px}
.sc-table th{background:var(--green-dark);color:var(--gold);font-family:'Bebas Neue',sans-serif;letter-spacing:1px;font-size:13px;padding:8px 10px;text-align:center;font-weight:400}
.sc-table th.left{text-align:left;padding-left:14px}
.sc-table td{padding:9px 10px;text-align:center;border-bottom:1px solid rgba(255,255,255,.05)}
.sc-table td.left{text-align:left;padding-left:14px;font-weight:500}
.sc-table tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.sc-table .tot-row td{background:var(--card2);font-weight:600;border-top:1px solid var(--gold);color:var(--gold)}
.sc-table .sub-row td{background:var(--card);font-weight:600;color:var(--text-muted);font-size:12px}
.cell-eagle{background:rgba(232,201,122,.25) !important;color:var(--gold);font-weight:700}
.cell-birdie{background:rgba(93,187,122,.2) !important;color:#5dbb7a;font-weight:700}
.cell-bogey{background:rgba(224,123,58,.15) !important;color:#e07b3a}
.cell-double{background:rgba(192,57,43,.2) !important;color:var(--red)}
.hist-card{background:var(--card);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;border:1px solid rgba(255,255,255,.06);cursor:pointer}
.hist-top{display:flex;justify-content:space-between;align-items:flex-start}
.hist-course{font-size:16px;font-weight:600}
.hist-date{font-size:12px;color:var(--text-muted)}
.hist-players{font-size:12px;color:var(--text-muted);margin-top:6px}
.hist-winner{font-size:13px;color:var(--gold);margin-top:4px}
.tabs{display:flex;background:var(--card);border-radius:10px;padding:4px;margin-bottom:16px}
.tab{flex:1;padding:8px;text-align:center;border-radius:7px;font-size:13px;cursor:pointer;transition:all .15s;color:var(--text-muted)}
.tab.active{background:var(--green);color:white;font-weight:500}
.step-indicator{display:flex;gap:6px;justify-content:center;margin-bottom:20px}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--card2)}
.step-dot.done{background:var(--gold)}
.step-dot.active{background:var(--green-light)}
.divider{height:1px;background:rgba(255,255,255,.07);margin:16px 0}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.stroke-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gold);margin-left:4px;vertical-align:middle}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;padding:20px 0}
.podium-col{text-align:center}
.podium-block{border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;color:var(--dark)}
.p1 .podium-block{background:var(--gold);height:80px;width:90px;font-size:36px}
.p2 .podium-block{background:#aaa;height:60px;width:75px;font-size:28px}
.p3 .podium-block{background:#cd7f32;height:45px;width:75px;font-size:28px}
.podium-name{font-size:12px;color:var(--text-muted);margin-top:6px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.podium-score{font-size:14px;font-weight:600}
.export-row{display:flex;gap:10px}
.export-row .home-btn{flex:1;padding:12px;font-size:14px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--mid);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:80vh;overflow-y:auto}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);margin-bottom:16px;letter-spacing:1px}
.add-course-link{text-align:center;padding:16px;font-size:14px;color:var(--green-light);cursor:pointer}
::-webkit-scrollbar{width:0}
</style>
</head>
<body>

<div id="s-home" class="screen active">
  <div class="hdr">
    <div>
      <div class="hdr-title">GolfMate</div>
      <div class="hdr-sub">Sydney Courses</div>
    </div>
  </div>
  <div class="body">
    <div class="home-hero">
      <div class="home-logo">GolfMate</div>
      <div class="home-tagline">Score &middot; Stableford &middot; Match &middot; Net</div>
    </div>
    <button class="home-btn btn-gold" onclick="startSetup()">+ New Round</button>
    <div class="section-label">Recent Rounds</div>
    <div id="history-preview"></div>
    <div id="history-empty" style="display:none" class="empty-state">
      <div class="empty-icon">&#x26F3;</div>
      <div>No rounds yet. Tee it up!</div>
    </div>
    <button class="home-btn btn-secondary" onclick="showScreen('s-history')">View All History</button>
    <button class="home-btn btn-secondary" onclick="showScreen('s-courses')">Manage Courses</button>
  </div>
</div>

<div id="s-setup" class="screen">
  <div class="hdr">
    <div>
      <div class="hdr-title">New Round</div>
      <div class="hdr-sub" id="setup-step-label">Step 1 of 4</div>
    </div>
    <button class="back-btn" onclick="showScreen('s-home')">Cancel</button>
  </div>
  <div class="body">
    <div class="step-indicator" id="step-dots"></div>
    <div id="setup-content"></div>
  </div>
</div>

<div id="s-scoring" class="screen">
  <div class="hole-header">
    <div>
      <div class="hole-num" id="sc-hole-num">HOLE 1</div>
      <div class="hole-meta" id="sc-hole-meta">Par 4 &middot; SI 3</div>
    </div>
    <div class="hole-nav">
      <button class="nav-btn" onclick="prevHole()">&#8249;</button>
      <button class="nav-btn" onclick="nextHole()">&#8250;</button>
      <button class="nav-btn finish" onclick="confirmFinish()" id="finish-btn">Done</button>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="sc-progress"></div></div>
  <div class="body" id="sc-body"></div>
</div>

<div id="s-results" class="screen">
  <div class="hdr">
    <div>
      <div class="hdr-title">Results</div>
      <div class="hdr-sub" id="res-subtitle"></div>
    </div>
    <button class="back-btn" onclick="showScreen('s-home')">Home</button>
  </div>
  <div class="body">
    <div id="res-podium"></div>
    <div class="tabs" id="res-tabs">
      <div class="tab active" onclick="resTab(0)">Leaderboard</div>
      <div class="tab" onclick="resTab(1)">Scorecard</div>
    </div>
    <div id="res-tab-0"></div>
    <div id="res-tab-1" style="display:none"></div>
    <div class="divider"></div>
    <div class="export-row">
      <button class="home-btn btn-secondary" onclick="exportCSV()">Export CSV</button>
      <button class="home-btn btn-gold" onclick="saveRound()">Save Round</button>
    </div>
  </div>
</div>

<div id="s-history" class="screen">
  <div class="hdr">
    <div><div class="hdr-title">Round History</div></div>
    <button class="back-btn" onclick="showScreen('s-home')">Back</button>
  </div>
  <div class="body" id="history-body"></div>
</div>

<div id="s-courses" class="screen">
  <div class="hdr">
    <div><div class="hdr-title">Courses</div></div>
    <button class="back-btn" onclick="showScreen('s-home')">Back</button>
  </div>
  <div class="body" id="courses-body"></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-body"></div>
</div>

// ── NAVIGATION ────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  if (id === 's-home') renderHome();
  if (id === 's-history') renderHistory();
  if (id === 's-courses') renderCourses();
}

// ── HOME ──────────────────────────────────────────────────────
function renderHome() {
  var hist = getHistory();
  var preview = document.getElementById('history-preview');
  var empty = document.getElementById('history-empty');
  if (!hist.length) { preview.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';
  var recent = hist.slice(-3).reverse();
  preview.innerHTML = recent.map(function(r){ return histCard(r); }).join('');
}

function histCard(r) {
  var date = new Date(r.date).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});
  var winner = getWinner(r);
  return '<div class="hist-card" onclick="viewRound(\''+r.id+'\')">'
    + '<div class="hist-top"><div class="hist-course">'+r.course+'</div><div class="hist-date">'+date+'</div></div>'
    + '<div class="hist-players">'+r.players.map(function(p){return p.name;}).join(' &middot; ')+' &middot; '+r.holes+' holes</div>'
    + (winner ? '<div class="hist-winner">&#x1F3C6; '+winner+'</div>' : '')
    + '</div>';
}

function getWinner(r) {
  if (!r.players.length) return null;
  var fmt = r.formats[0];
  if (fmt === 'stableford') {
    var best = r.players.reduce(function(a,b){ return totalPts(b,r)>totalPts(a,r)?b:a; });
    return best.name + ' &middot; ' + totalPts(best,r) + ' pts';
  }
  if (fmt === 'matchgross' || fmt === 'match') {
    var ms = matchPlayStatus(r, r.holeData.length-1);
    return ms ? ms.status : 'All Square';
  }
  var best2 = r.players.reduce(function(a,b){ return netTotal(b,r)<netTotal(a,r)?b:a; });
  return best2.name + ' &middot; Net ' + netTotal(best2,r);
}

// ── ROUND ─────────────────────────────────────────────────────
function buildHoleList(course, numHoles) {
  var base = course.hole_data;
  if (numHoles <= base.length) return base.slice(0,numHoles).map(function(h,i){ return {par:h.par,si:h.si,holeNum:i+1}; });
  var second = base.map(function(h,i){ return {par:h.par,si:h.si,holeNum:i+10}; });
  return base.map(function(h,i){ return {par:h.par,si:h.si,holeNum:i+1}; }).concat(second);
}

function startRound() {
  var course = getAllCourses().find(function(c){ return c.id===setupData.courseId; });
  var holes = buildHoleList(course, setupData.numHoles);
  round = {
    id: Date.now().toString(),
    date: setupData.date,
    course: course.name,
    courseId: setupData.courseId,
    holes: setupData.numHoles,
    formats: setupData.formats.slice(),
    players: setupData.players.map(function(p){
      return {name:p.name, hcp:Math.round(parseFloat(p.hcp)||0), scores:holes.map(function(){return 0;})};
    }),
    holeData: holes,
    currentHole: 0,
    saved: false
  };
  showScreen('s-scoring');
  renderScoringHole();
}

// ── SCORING ───────────────────────────────────────────────────
function strokesOnHole(hcp, si, total) {
  if (!hcp || hcp <= 0) return 0;
  var base = Math.floor(hcp/total);
  var extra = hcp % total;
  return base + (si <= extra ? 1 : 0);
}

function stablefordPts(score, par, strokes) {
  if (!score) return 0;
  var net = score - par - strokes;
  if (net <= -2) return 4;
  if (net === -1) return 3;
  if (net === 0) return 2;
  if (net === 1) return 1;
  return 0;
}

function matchHoleResult(r, hi) {
  if (r.players.length < 2) return null;
  var isGross = r.formats.indexOf('matchgross') > -1;
  var s0 = r.players[0].scores[hi] || 0;
  var s1 = r.players[1].scores[hi] || 0;
  if (!s0 || !s1) return null;
  var n0 = isGross ? s0 : s0 - strokesOnHole(r.players[0].hcp, r.holeData[hi].si, r.holeData.length);
  var n1 = isGross ? s1 : s1 - strokesOnHole(r.players[1].hcp, r.holeData[hi].si, r.holeData.length);
  if (n0 < n1) return 0;
  if (n1 < n0) return 1;
  return -1;
}

function matchPlayStatus(r, upTo) {
  if (r.players.length < 2) return null;
  var score = 0;
  var played = 0;
  for (var i = 0; i <= upTo; i++) {
    var res = matchHoleResult(r, i);
    if (res === null) continue;
    played++;
    if (res === 0) score++;
    else if (res === 1) score--;
  }
  var holesLeft = r.holeData.length - upTo - 1;
  var up = Math.abs(score);
  var leader = score > 0 ? 0 : score < 0 ? 1 : -1;
  var won = up > holesLeft;
  var dormie = up === holesLeft && up > 0;
  var status;
  if (leader === -1) status = 'All Square';
  else if (won) status = r.players[leader].name + ' wins ' + up + '&' + holesLeft;
  else if (dormie) status = r.players[leader].name + ' Dormie ' + up;
  else status = r.players[leader].name + ' ' + up + ' UP';
  return {leader:leader, up:up, holesLeft:holesLeft, won:won, dormie:dormie, status:status, played:played};
}

function renderScoringHole() {
  var h = round.holeData[round.currentHole];
  document.getElementById('sc-hole-num').textContent = 'HOLE ' + h.holeNum;
  document.getElementById('sc-hole-meta').textContent = 'Par ' + h.par + ' \u00b7 SI ' + h.si;
  document.getElementById('sc-progress').style.width = ((round.currentHole+1)/round.holeData.length*100) + '%';
  var isLast = round.currentHole === round.holeData.length-1;
  document.getElementById('finish-btn').textContent = isLast ? 'Finish' : 'Done';

  // init scores to par
  round.players.forEach(function(p) {
    if (!p.scores[round.currentHole]) p.scores[round.currentHole] = h.par;
  });

  var isMatch = round.formats.indexOf('match') > -1 || round.formats.indexOf('matchgross') > -1;
  var hasSF = round.formats.indexOf('stableford') > -1;

  var rows = round.players.map(function(p, pi) {
    var score = p.scores[round.currentHole];
    var strokes = strokesOnHole(p.hcp, h.si, round.holeData.length);
    var pts = stablefordPts(score, h.par, strokes);
    var diff = score - h.par;
    var cls = diff <= -2 ? 'eagle' : diff === -1 ? 'birdie' : diff === 0 ? 'par-score' : diff === 1 ? 'bogey' : diff === 2 ? 'double' : 'worse';
    var runInfo = getRunningInfo(p, pi);
    return '<div class="score-row">'
      + '<div class="score-player">'
      + '<div class="score-name">'+p.name+(strokes>0?'<span class="stroke-dot"></span>':'')+'</div>'
      + '<div class="score-running">'+runInfo+'</div>'
      + '</div>'
      + '<div class="stepper">'
      + '<button class="step-btn step-minus" onclick="adjustScore('+pi+',-1)">&#8722;</button>'
      + '<div class="step-val '+cls+'">'+score+'</div>'
      + '<button class="step-btn step-plus" onclick="adjustScore('+pi+',1)">+</button>'
      + '</div>'
      + (hasSF ? '<div class="score-pts">'+pts+'pts</div>' : '')
      + '</div>';
  }).join('');

  document.getElementById('sc-body').innerHTML = rows + renderRunningSummary();
}

function getRunningInfo(p, pi) {
  var isMatch = round.formats.indexOf('match') > -1 || round.formats.indexOf('matchgross') > -1;
  if (isMatch && round.players.length === 2) {
    var ms = matchPlayStatus(round, round.currentHole);
    if (!ms || ms.played === 0) return 'Not started';
    if (ms.leader === -1) return 'All Square';
    if (ms.leader === pi) return ms.won ? 'Won ' + ms.up + '&' + ms.holesLeft : ms.dormie ? 'Dormie ' + ms.up : ms.up + ' UP';
    return ms.won ? ms.up + '&' + ms.holesLeft + ' down' : ms.up + ' DOWN';
  }
  var played = round.holeData.slice(0, round.currentHole+1).filter(function(h,i){ return p.scores[i]>0; }).length;
  if (!played) return 'Not started';
  var gross = 0, parSoFar = 0;
  for (var i = 0; i <= round.currentHole; i++) {
    if (p.scores[i]) { gross += p.scores[i]; parSoFar += round.holeData[i].par; }
  }
  var diff = gross - parSoFar;
  var diffStr = diff === 0 ? 'E' : diff > 0 ? '+'+diff : ''+diff;
  var hasSF = round.formats.indexOf('stableford') > -1;
  if (hasSF) {
    var pts = 0;
    for (var j = 0; j <= round.currentHole; j++) {
      pts += stablefordPts(p.scores[j]||0, round.holeData[j].par, strokesOnHole(p.hcp, round.holeData[j].si, round.holeData.length));
    }
    return 'Gross ' + diffStr + ' \u00b7 ' + pts + 'pts';
  }
  return 'Gross ' + diffStr;
}

function renderRunningSummary() {
  var r = round;
  var played = r.currentHole + 1;
  var parSoFar = 0;
  for (var i = 0; i < played; i++) parSoFar += r.holeData[i].par;
  var totalPar2 = 0;
  r.holeData.forEach(function(h){ totalPar2 += h.par; });
  var isMatch = r.formats.indexOf('match') > -1 || r.formats.indexOf('matchgross') > -1;

  if (isMatch && r.players.length === 2) {
    var ms = matchPlayStatus(r, r.currentHole);
    var statusStr = ms ? ms.status : 'All Square';
    var p0w = 0, p1w = 0, halv = 0;
    for (var k = 0; k < played; k++) {
      var res = matchHoleResult(r, k);
      if (res === 0) p0w++;
      else if (res === 1) p1w++;
      else if (res === -1) halv++;
    }
    return '<div style="background:var(--card);border-radius:var(--r);border:1px solid rgba(201,168,76,.2);margin-top:8px;overflow:hidden">'
      + '<div style="background:var(--green-dark);padding:8px 10px;display:flex;justify-content:space-between;align-items:center">'
      + '<span style="font-family:\'Bebas Neue\',sans-serif;font-size:14px;letter-spacing:1px;color:var(--gold)">MATCH STATUS</span>'
      + '<span style="font-size:11px;color:var(--text-muted)">Thru '+played+'</span></div>'
      + '<div style="padding:12px 16px;text-align:center">'
      + '<div style="font-size:20px;font-weight:700;color:var(--gold);margin-bottom:6px">'+statusStr+'</div>'
      + '<div style="display:flex;justify-content:center;gap:16px;font-size:12px;color:var(--text-muted)">'
      + '<span>'+r.players[0].name+': '+p0w+'W</span>'
      + '<span>Halved: '+halv+'</span>'
      + '<span>'+r.players[1].name+': '+p1w+'W</span>'
      + '</div></div></div>';
  }

  var hasSF = r.formats.indexOf('stableford') > -1;
  var fmt = r.formats[0];
  var playerData = r.players.map(function(p) {
    var gross = 0;
    for (var i = 0; i < played; i++) gross += (p.scores[i]||0);
    var pts = 0;
    for (var j = 0; j < played; j++) pts += stablefordPts(p.scores[j]||0, r.holeData[j].par, strokesOnHole(p.hcp, r.holeData[j].si, r.holeData.length));
    var diff = gross - parSoFar;
    return {p:p, gross:gross, pts:pts, diff:diff};
  });
  playerData.sort(function(a,b){ return hasSF ? b.pts-a.pts : a.gross-b.gross; });

  var cols;
  if (hasSF) {
    cols = '<div style="display:grid;grid-template-columns:1fr auto auto;width:100%">'
      + '<div style="font-size:10px;color:var(--text-muted);padding:0 10px 4px">Player</div>'
      + '<div style="font-size:10px;color:var(--text-muted);padding:0 10px 4px;text-align:right">Gross</div>'
      + '<div style="font-size:10px;color:var(--gold);padding:0 10px 4px;text-align:right">Pts</div>'
      + playerData.map(function(d, rank) {
          var diffStr = d.diff===0?'E':d.diff>0?'+'+d.diff:''+d.diff;
          var init = d.p.name.split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);
          return '<div style="padding:6px 10px;display:flex;align-items:center;gap:6px;border-top:1px solid rgba(255,255,255,.05)">'
            + '<span style="font-size:11px;color:var(--text-muted);width:14px">'+(rank+1)+'</span>'
            + '<span style="width:26px;height:26px;border-radius:50%;background:var(--green-dark);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--gold);flex-shrink:0">'+init+'</span>'
            + '<span style="font-size:14px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+d.p.name+'</span>'
            + '</div>'
            + '<div style="padding:6px 10px;text-align:right;border-top:1px solid rgba(255,255,255,.05);font-size:14px;color:'+(d.diff>0?'var(--red)':d.diff<0?'#5dbb7a':'var(--text)')+'">'+diffStr+'</div>'
            + '<div style="padding:6px 10px;text-align:right;border-top:1px solid rgba(255,255,255,.05);font-size:16px;font-weight:700;color:var(--gold)">'+d.pts+'</div>';
        }).join('')
      + '</div>';
  } else {
    cols = '<div style="display:grid;grid-template-columns:1fr auto;width:100%">'
      + '<div style="font-size:10px;color:var(--text-muted);padding:0 10px 4px">Player</div>'
      + '<div style="font-size:10px;color:var(--text-muted);padding:0 10px 4px;text-align:right">vs Par</div>'
      + playerData.map(function(d, rank) {
          var diffStr = d.diff===0?'E':d.diff>0?'+'+d.diff:''+d.diff;
          var init = d.p.name.split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);
          return '<div style="padding:6px 10px;display:flex;align-items:center;gap:6px;border-top:1px solid rgba(255,255,255,.05)">'
            + '<span style="font-size:11px;color:var(--text-muted);width:14px">'+(rank+1)+'</span>'
            + '<span style="width:26px;height:26px;border-radius:50%;background:var(--green-dark);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--gold);flex-shrink:0">'+init+'</span>'
            + '<span style="font-size:14px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+d.p.name+'</span>'
            + '</div>'
            + '<div style="padding:6px 10px;text-align:right;border-top:1px solid rgba(255,255,255,.05);font-size:16px;font-weight:700;color:'+(d.diff>0?'var(--red)':d.diff<0?'#5dbb7a':'var(--text)')+'">'+diffStr+'</div>';
        }).join('')
      + '</div>';
  }

  return '<div style="background:var(--card);border-radius:var(--r);border:1px solid rgba(201,168,76,.2);margin-top:8px;overflow:hidden">'
    + '<div style="background:var(--green-dark);padding:8px 10px;display:flex;justify-content:space-between;align-items:center">'
    + '<span style="font-family:\'Bebas Neue\',sans-serif;font-size:14px;letter-spacing:1px;color:var(--gold)">RUNNING TOTALS</span>'
    + '<span style="font-size:11px;color:var(--text-muted)">Thru '+played+' \u00b7 Par '+parSoFar+'/'+totalPar2+'</span>'
    + '</div>'+cols+'</div>';
}

function adjustScore(pi, delta) {
  var h = round.holeData[round.currentHole];
  var s = Math.max(1, Math.min(15, (round.players[pi].scores[round.currentHole]||h.par) + delta));
  round.players[pi].scores[round.currentHole] = s;
  renderScoringHole();
}

function prevHole() { if (round.currentHole>0) { round.currentHole--; renderScoringHole(); } }
function nextHole() { if (round.currentHole<round.holeData.length-1) { round.currentHole++; renderScoringHole(); } }

function confirmFinish() {
  var isLast = round.currentHole === round.holeData.length-1;
  if (!isLast) { nextHole(); return; }
  if (round.players.some(function(p){ return p.scores.some(function(s){return !s;}); })) {
    if (!confirm('Some holes have no score. Finish anyway?')) return;
  }
  showResults();
}

// ── RESULTS ───────────────────────────────────────────────────
function grossTotal(p) { return p.scores.reduce(function(a,b){ return a+(b||0); },0); }
function netTotal(p) { return grossTotal(p) - p.hcp; }
function totalPts(p, r) {
  return r.holeData.reduce(function(acc,h,i){
    return acc + stablefordPts(p.scores[i]||0, h.par, strokesOnHole(p.hcp, h.si, r.holeData.length));
  },0);
}
function parTotal(r) { return r.holeData.reduce(function(a,h){ return a+h.par; },0); }

function showResults() {
  showScreen('s-results');
  var r = round;
  var d = new Date(r.date).toLocaleDateString('en-AU',{day:'numeric',month:'short'});
  document.getElementById('res-subtitle').textContent = r.course + ' \u00b7 ' + r.holes + ' holes \u00b7 ' + d;

  var fmt = r.formats[0];
  var isMatch = fmt==='match'||fmt==='matchgross';
  var players2 = r.players.map(function(p){ return {p:p,_gross:grossTotal(p),_net:netTotal(p),_pts:totalPts(p,r)}; });
  if (!isMatch) {
    if (fmt==='stableford') players2.sort(function(a,b){ return b._pts-a._pts; });
    else players2.sort(function(a,b){ return a._net-b._net; });
  }

  var podium = document.getElementById('res-podium');
  if (!isMatch && players2.length >= 2) {
    var order = players2.length >= 3 ? [players2[1],players2[0],players2[2]] : [players2[0],players2[1]];
    var cls2 = players2.length >= 3 ? ['p2','p1','p3'] : ['p1','p2'];
    podium.innerHTML = '<div class="podium">'+order.map(function(d,i){
      var sc = fmt==='stableford' ? d._pts+'pts' : 'Net '+d._net;
      var num = cls2[i]==='p1'?'1':cls2[i]==='p2'?'2':'3';
      return '<div class="podium-col '+cls2[i]+'">'
        +'<div class="podium-block">'+num+'</div>'
        +'<div class="podium-name">'+d.p.name+'</div>'
        +'<div class="podium-score">'+sc+'</div>'
        +'</div>';
    }).join('')+'</div>';
  } else { podium.innerHTML = ''; }

  renderResTab(0);
}

function resTab(idx) {
  document.querySelectorAll('#res-tabs .tab').forEach(function(t,i){ t.classList.toggle('active',i===idx); });
  document.getElementById('res-tab-0').style.display = idx===0?'':'none';
  document.getElementById('res-tab-1').style.display = idx===1?'':'none';
  renderResTab(idx);
}

function renderResTab(idx) { if (idx===0) renderLeaderboard(); else renderScorecardView(); }

function renderLeaderboard() {
  var r = round;
  var fmt = r.formats[0];
  var isMatch = fmt==='match'||fmt==='matchgross';
  var parTot = parTotal(r);
  var el = document.getElementById('res-tab-0');
  var posClasses = ['gold','silver','bronze'];

  if (isMatch) {
    var ms = matchPlayStatus(r, r.holeData.length-1);
    var statusStr = ms ? ms.status : 'All Square';
    var cards = r.players.map(function(p,i){
      var wins = r.holeData.filter(function(h,hi){ return matchHoleResult(r,hi)===i; }).length;
      return '<div style="flex:1;max-width:140px;background:var(--card);border-radius:var(--r);padding:14px;margin:0 4px;text-align:center">'
        +'<div style="font-size:15px;font-weight:600">'+p.name+'</div>'
        +'<div style="font-size:32px;font-weight:700;color:var(--gold);margin:6px 0">'+wins+'</div>'
        +'<div style="font-size:12px;color:var(--text-muted)">holes won</div>'
        +'<div style="font-size:11px;color:var(--text-muted);margin-top:4px">HCP '+p.hcp+'</div>'
        +'</div>';
    }).join('');
    var halv2 = r.holeData.filter(function(h,hi){ return matchHoleResult(r,hi)===-1; }).length;
    var halvCard = '<div style="display:flex;flex-direction:column;justify-content:center;align-items:center;padding:0 12px">'
      +'<div style="font-size:28px;font-weight:700;color:var(--text-muted)">'+halv2+'</div>'
      +'<div style="font-size:11px;color:var(--text-muted)">halved</div></div>';
    el.innerHTML = '<div style="padding:20px;text-align:center">'
      +'<div style="font-size:13px;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">'+fmtLabel(fmt)+' Result</div>'
      +'<div style="font-size:28px;font-weight:700;color:var(--gold);margin-bottom:16px">'+statusStr+'</div>'
      +'<div style="display:flex;justify-content:center;align-items:stretch">'+cards+halvCard+'</div></div>';
    return;
  }

  var sorted = r.players.map(function(p){ return {p:p,_gross:grossTotal(p),_net:netTotal(p),_pts:totalPts(p,r)}; });
  if (fmt==='stableford') sorted.sort(function(a,b){ return b._pts-a._pts; });
  else sorted.sort(function(a,b){ return a._net-b._net; });

  el.innerHTML = sorted.map(function(d,i){
    var diff = d._gross - parTot;
    var diffStr = diff===0?'E':diff>0?'+'+diff:''+diff;
    var main, sub;
    if (fmt==='stableford') { main=d._pts+' pts'; sub='Gross '+diffStr+' \u00b7 Net '+d._net; }
    else if (fmt==='net') { main='Net '+d._net; sub='Gross '+d._gross+' \u00b7 HCP '+d.p.hcp; }
    else { main='Gross '+d._gross; sub=diffStr; }
    if (r.formats.indexOf('stableford')>-1 && fmt!=='stableford') sub += ' \u00b7 '+d._pts+'pts';
    return '<div class="lb-row">'
      +'<div class="lb-pos '+(posClasses[i]||'')+'">'+  (i+1)+'</div>'
      +'<div><div class="lb-name">'+d.p.name+'</div><div style="font-size:12px;color:var(--text-muted)">HCP '+d.p.hcp+'</div></div>'
      +'<div class="lb-scores"><div class="lb-main">'+main+'</div><div class="lb-sub">'+sub+'</div></div>'
      +'</div>';
  }).join('');
}

function renderScorecardView() {
  var r = round;
  var parTot = parTotal(r);
  var html = '<div class="sc-wrap"><table class="sc-table"><thead><tr>'
    + '<th class="left">Hole</th>'
    + r.holeData.map(function(h){ return '<th>'+h.holeNum+'</th>'; }).join('')
    + '<th>TOT</th></tr><tr>'
    + '<th class="left" style="font-size:11px">Par</th>'
    + r.holeData.map(function(h){ return '<th style="font-size:11px">'+h.par+'</th>'; }).join('')
    + '<th style="font-size:11px">'+parTot+'</th></tr><tr>'
    + '<th class="left" style="font-size:11px">SI</th>'
    + r.holeData.map(function(h){ return '<th style="font-size:11px">'+h.si+'</th>'; }).join('')
    + '<th></th></tr></thead><tbody>';

  r.players.forEach(function(p) {
    var gross = grossTotal(p);
    html += '<tr><td class="left">'+p.name+'<br><span style="font-size:10px;color:var(--text-muted)">HC'+p.hcp+'</span></td>'
      + r.holeData.map(function(h,i){
          var s = p.scores[i]||0;
          var diff = s - h.par;
          var cls = diff<=-2?'cell-eagle':diff===-1?'cell-birdie':diff===1?'cell-bogey':diff>=2?'cell-double':'';
          var strokes = strokesOnHole(p.hcp, h.si, r.holeData.length);
          return '<td class="'+cls+'">'+(s||'–')+(strokes>0?'&bull;':'')+'</td>';
        }).join('')
      + '<td style="font-weight:700">'+gross+'</td></tr>';
    if (r.formats.indexOf('stableford') > -1) {
      var pts = r.holeData.map(function(h,i){ return stablefordPts(p.scores[i]||0, h.par, strokesOnHole(p.hcp, h.si, r.holeData.length)); });
      var totPts = pts.reduce(function(a,b){return a+b;},0);
      html += '<tr class="sub-row"><td class="left" style="font-size:11px">Pts</td>'
        + pts.map(function(pt){ return '<td>'+pt+'</td>'; }).join('')
        + '<td style="font-weight:700;color:var(--gold)">'+totPts+'</td></tr>';
    }
  });
  html += '</tbody></table></div>';
  document.getElementById('res-tab-1').innerHTML = html;
}

// ── SAVE / EXPORT ─────────────────────────────────────────────
function saveRound() {
  if (round.saved) { alert('Round already saved!'); return; }
  var hist = getHistory();
  round.saved = true;
  hist.push(round);
  saveHistory(hist);
  alert('Round saved! \u2713');
}

function exportCSV() {
  var r = round;
  var csv = 'GolfMate Export\nCourse,' + r.course + '\nDate,' + r.date
    + '\nFormat,' + r.formats.map(fmtLabel).join(' + ')
    + '\nHoles,' + r.holes + '\n\nHole,Par,SI,'
    + r.players.map(function(p){return p.name;}).join(',') + '\n';
  r.holeData.forEach(function(h,i){
    csv += h.holeNum+','+h.par+','+h.si+','+r.players.map(function(p){return p.scores[i]||0;}).join(',') + '\n';
  });
  csv += '\nTotals\n,,Gross,' + r.players.map(function(p){return grossTotal(p);}).join(',') + '\n';
  csv += ',,Net,' + r.players.map(function(p){return netTotal(p);}).join(',') + '\n';
  if (r.formats.indexOf('stableford')>-1)
    csv += ',,Stableford Pts,' + r.players.map(function(p){return totalPts(p,r);}).join(',') + '\n';
  var blob = new Blob([csv],{type:'text/csv'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href=url; a.download='GolfMate_'+r.course.replace(/\s+/g,'_')+'_'+r.date+'.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ── HISTORY ───────────────────────────────────────────────────
function renderHistory() {
  var hist = getHistory().reverse();
  var el = document.getElementById('history-body');
  if (!hist.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">&#x1F4CB;</div><div>No saved rounds yet.</div></div>'; return; }
  el.innerHTML = hist.map(function(r){ return histCard(r); }).join('');
}

function viewRound(id) {
  var r = getHistory().find(function(r){ return r.id===id; });
  if (!r) return;
  round = r;
  showResults();
}

function deleteCustomCourse(i) {
  if (!confirm('Delete this course?')) return;
  var arr = getCustomCourses();
  arr.splice(i,1);
  saveCustomCourses(arr);
  renderCourses();
}

function showAddCourse() {
  openModal('<div class="modal-title">Add Course</div>'
    +'<div style="font-size:13px;color:var(--text-muted);margin-bottom:14px">Search our database or enter manually.</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:8px">'

    +'<button onclick="doSearch()" style="background:var(--green);border:none;border-radius:8px;color:white;padding:0 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:\'DM Sans\',sans-serif">Search</button>'
    +'</div>'
    +'<div id="nc-status" style="font-size:13px;color:var(--text-muted);min-height:20px;margin-bottom:8px"></div>'
    +'<div id="nc-results"></div>'
    +'<div class="divider"></div>'
    +'<div id="nc-manual" style="display:none">'
    +'<div class="field"><label>Course Name</label><input type="text" id="nc-name" placeholder="Course name"></div>'
    +'<div class="field"><label>Location</label><input type="text" id="nc-loc" placeholder="Suburb, City"></div>'

function doSearch() {
  var query = document.getElementById('nc-search').value.trim().toLowerCase();
  if (!query) return;
  var status = document.getElementById('nc-status');
  var results = document.getElementById('nc-results');
  results.innerHTML = '';
  var tokens = query.split(/\s+/).filter(function(t){ return t.length > 1; });
  var all = COURSE_DB.concat(getCustomCourses());
  var scored = all.map(function(c){
    var hay = (c.name+' '+c.location).toLowerCase();
    var score = 0;
    tokens.forEach(function(t){ if(hay.indexOf(t)>-1) score+=t.length; });
    if (hay.indexOf(query)>-1) score+=20;
    return {c:c, score:score};
  }).filter(function(x){ return x.score>0; }).sort(function(a,b){ return b.score-a.score; }).slice(0,5);

  if (!scored.length) {
    status.innerHTML = '<span style="color:var(--text-muted)">No matches. Try a shorter name or enter manually.</span>';
    return;
  }
  status.innerHTML = '<span style="color:#5dbb7a">&#10003; '+scored.length+' match'+(scored.length>1?'es':'')+' found</span>';
  window._searchResults = scored.map(function(x){ return x.c; });
  results.innerHTML = scored.map(function(x,i){
    var par = x.c.hole_data.reduce(function(a,h){ return a+h.par; },0);
    return '<div class="card" style="cursor:pointer;margin-bottom:8px" onclick="previewCourse('+i+')">'
      +'<div style="display:flex;justify-content:space-between;align-items:center">'
      +'<div><div style="font-size:15px;font-weight:600">'+x.c.name+'</div>'
      +'<div style="font-size:12px;color:var(--text-muted);margin-top:2px">'+x.c.location+' \u00b7 Par '+par+' \u00b7 '+x.c.holes+' holes</div></div>'
      +'<span style="color:var(--green-light);font-size:22px">&#8250;</span>'
      +'</div></div>';
  }).join('');
}

function previewCourse(idx) {
  var c = window._searchResults[idx];
  var par = c.hole_data.reduce(function(a,h){ return a+h.par; },0);
  var front = c.hole_data.slice(0, Math.min(9,c.holes));
  var back = c.holes > 9 ? c.hole_data.slice(9) : [];
  function tbl(holes, label, start) {
    return '<div style="font-size:10px;color:var(--text-muted);margin:8px 0 4px;text-transform:uppercase;letter-spacing:1px">'+label+'</div>'
      +'<div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%;font-size:13px">'
      +'<tr style="background:var(--green-dark)">'
      +'<td style="padding:4px 6px;color:var(--gold);font-family:\'Bebas Neue\',sans-serif;font-size:12px">Hole</td>'
      +holes.map(function(h,i){ return '<td style="padding:4px 4px;text-align:center;color:var(--gold);font-size:12px">'+(start+i)+'</td>'; }).join('')
      +'<td style="padding:4px 6px;text-align:center;color:var(--gold);font-size:12px">Tot</td></tr>'
      +'<tr><td style="padding:4px 6px;color:var(--text-muted);font-size:11px">Par</td>'
      +holes.map(function(h){ return '<td style="padding:4px 4px;text-align:center">'+h.par+'</td>'; }).join('')
      +'<td style="padding:4px 6px;text-align:center;font-weight:600">'+holes.reduce(function(a,h){return a+h.par;},0)+'</td></tr>'
      +'<tr style="background:rgba(255,255,255,.03)"><td style="padding:4px 6px;color:var(--text-muted);font-size:11px">SI</td>'
      +holes.map(function(h){ return '<td style="padding:4px 4px;text-align:center;color:var(--text-muted)">'+h.si+'</td>'; }).join('')
      +'<td></td></tr></table></div>';
  }
  document.getElementById('nc-results').innerHTML =
    '<div style="background:var(--card2);border-radius:var(--r);padding:14px;border:1px solid rgba(201,168,76,.2);margin-bottom:10px">'
    +'<div style="font-size:16px;font-weight:600">'+c.name+'</div>'
    +'<div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">'+c.location+' \u00b7 Par '+par+' \u00b7 '+c.holes+' holes</div>'
    +tbl(front,'Front 9',1)+(back.length?tbl(back,'Back 9',10):'')
    +'</div>'
    +'<div style="font-size:11px;color:var(--text-muted);text-align:center;margin-bottom:10px">Verify SI against the official scorecard</div>'
    +'<button class="home-btn btn-gold" onclick="confirmCourse('+idx+')">&#10003; Save This Course</button>'
    +'<button class="home-btn btn-secondary" onclick="editCourse('+idx+')">&#9999; Edit Before Saving</button>'
    +'<button class="home-btn btn-secondary" onclick="doSearch()">&#8592; Back to Results</button>';
  document.getElementById('nc-status').innerHTML = '';
}

function confirmCourse(idx) {
  var c = window._searchResults[idx];
  var par = c.hole_data.reduce(function(a,h){ return a+h.par; },0);
  var arr = getCustomCourses();
  arr.push({id:'custom-'+Date.now(), name:c.name, location:c.location, holes:c.holes, par:par, hole_data:c.hole_data});
  saveCustomCourses(arr);
  closeModal();
  renderCourses();
  if (document.getElementById('s-setup').classList.contains('active')) renderSetupStep();
}

function editCourse(idx) {
  var c = window._searchResults[idx];
  showManualEntry(c.name, c.location, c.holes, c.hole_data);
}

function showManualEntry(name, loc, holes, existingData) {
  name = name || ''; loc = loc || ''; holes = holes || 18;
  document.getElementById('nc-manual').style.display = '';
  document.getElementById('nc-results').innerHTML = '';
  document.getElementById('nc-status').innerHTML = '';
  var nameEl = document.getElementById('nc-name');
  var locEl = document.getElementById('nc-loc');
  if (nameEl) nameEl.value = name;
  if (locEl) locEl.value = loc;
  window._ncHoles = holes;
  renderHoleGrid(holes);
  if (existingData) {
    setTimeout(function(){
      existingData.forEach(function(h,i){
        var pe = document.getElementById('nc-par-'+(i+1));
        var se = document.getElementById('nc-si-'+(i+1));
        if (pe) pe.value = h.par;
        if (se) se.value = h.si;
      });
    }, 50);
  }
  document.getElementById('nc-manual').scrollIntoView({behavior:'smooth'});
}

function setNcHoles(n, btn) {
  window._ncHoles = n;
  btn.closest('.pills').querySelectorAll('.pill').forEach(function(p){ p.classList.remove('active'); });
  btn.classList.add('active');
  renderHoleGrid(n);
}

function renderHoleGrid(n) {
  var el = document.getElementById('nc-hole-grid');
  if (!el) return;
  var html = '<div class="section-label">Par &amp; Stroke Index per hole</div>'
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">';
  for (var i = 1; i <= n; i++) {
    html += '<div style="background:var(--card2);border-radius:8px;padding:8px;text-align:center">'
      +'<div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">Hole '+i+'</div>'
      +'<div style="display:flex;gap:4px">'
      +'<input type="number" id="nc-par-'+i+'" min="3" max="6" value="4"'
      +' style="width:50%;background:var(--dark);border:1px solid rgba(255,255,255,.1);border-radius:4px;color:var(--text);text-align:center;padding:4px;font-size:14px">'
      +'<input type="number" id="nc-si-'+i+'" min="1" max="'+n+'" value="'+i+'"'
      +' style="width:50%;background:var(--dark);border:1px solid rgba(255,255,255,.1);border-radius:4px;color:var(--text);text-align:center;padding:4px;font-size:14px">'
      +'</div>'
      +'<div style="font-size:10px;color:var(--text-muted);margin-top:2px">Par / SI</div></div>';
  }
  html += '</div>';
  el.innerHTML = html;
}

function saveCustomCourse() {
  var name = document.getElementById('nc-name').value.trim();
  var loc = document.getElementById('nc-loc').value.trim();
  var n = window._ncHoles || 18;
  if (!name) { alert('Enter a course name'); return; }
  var hole_data = [];
  var par = 0;
  for (var i = 1; i <= n; i++) {
    var p2 = parseInt(document.getElementById('nc-par-'+i).value) || 4;
    var si = parseInt(document.getElementById('nc-si-'+i).value) || i;
    hole_data.push({par:p2, si:si});
    par += p2;
  }
  var arr = getCustomCourses();
  arr.push({id:'custom-'+Date.now(), name:name, location:loc, holes:n, par:par, hole_data:hole_data});
  saveCustomCourses(arr);
  closeModal();
  renderCourses();
  if (document.getElementById('s-setup').classList.contains('active')) renderSetupStep();
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if (!e || e.target.id==='modal-overlay') {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

// ── INIT ──────────────────────────────────────────────────────
renderHome();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GolfMate</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a6b3a;
    --green-light: #2d9653;
    --green-dark: #0f3d20;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #f5f0e8;
    --dark: #111810;
    --mid: #2a3328;
    --text: #e8ede6;
    --text-muted: #8fa088;
    --card: #1c2a1e;
    --card2: #243028;
    --red: #c0392b;
    --blue: #2980b9;
    --r: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; height: 100vh; overflow: hidden; }
  .screen.active { display: flex; }

  /* ── HEADER ── */
  .hdr { background: var(--green-dark); padding: 14px 18px 12px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; border-bottom: 1px solid rgba(201,168,76,.25); }
  .hdr-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--gold); }
  .hdr-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .back-btn { background: none; border: 1px solid rgba(255,255,255,.2); color: var(--text); padding: 6px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; }

  /* ── SCROLL BODY ── */
  .body { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }

  /* ── HOME ── */
  .home-hero { text-align: center; padding: 28px 0 20px; }
  .home-logo { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 4px; color: var(--gold); line-height: 1; }
  .home-tagline { font-size: 13px; color: var(--text-muted); margin-top: 6px; letter-spacing: 1px; text-transform: uppercase; }
  .home-btn { display: block; width: 100%; padding: 16px; border-radius: var(--r); font-size: 16px; font-weight: 600; cursor: pointer; border: none; margin-bottom: 12px; font-family: 'DM Sans', sans-serif; transition: opacity .15s; }
  .home-btn:active { opacity: .8; }
  .btn-primary { background: var(--green); color: white; }
  .btn-secondary { background: var(--card); color: var(--text); border: 1px solid rgba(255,255,255,.12); }
  .btn-gold { background: var(--gold); color: var(--dark); }
  .btn-danger { background: var(--red); color: white; }
  .section-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin: 20px 0 10px; }

  /* ── CARDS ── */
  .card { background: var(--card); border-radius: var(--r); padding: 14px 16px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,.06); }
  .card-title { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
  .card-val { font-size: 18px; font-weight: 600; }

  /* ── FORM ELEMENTS ── */
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
  .field input, .field select { width: 100%; background: var(--card); border: 1px solid rgba(255,255,255,.12); border-radius: 8px; color: var(--text); font-size: 16px; padding: 12px 14px; font-family: 'DM Sans', sans-serif; outline: none; appearance: none; -webkit-appearance: none; }
  .field input:focus, .field select:focus { border-color: var(--green-light); }
  .field select option { background: var(--dark); }

  /* ── PILL TOGGLES ── */
  .pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
  .pill { padding: 8px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,.18); background: transparent; color: var(--text); font-size: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .15s; }
  .pill.active { background: var(--green); border-color: var(--green); color: white; font-weight: 500; }
  .pill:active { opacity: .8; }

  /* ── PLAYER ROWS ── */
  .player-row { display: flex; align-items: center; gap: 10px; background: var(--card); border-radius: var(--r); padding: 10px 14px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,.06); }
  .player-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--green-dark); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--gold); flex-shrink: 0; }
  .player-info { flex: 1; }
  .player-name { font-size: 15px; font-weight: 500; }
  .player-hcp { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .player-score-summary { text-align: right; }
  .player-gross { font-size: 18px; font-weight: 600; }
  .player-net { font-size: 12px; color: var(--text-muted); }
  .player-pts { font-size: 14px; color: var(--gold); font-weight: 500; }

  /* ── HOLE SCORING ── */
  .hole-header { background: var(--green-dark); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; border-bottom: 1px solid rgba(201,168,76,.15); }
  .hole-info { }
  .hole-num { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--gold); line-height: 1; }
  .hole-meta { font-size: 12px; color: var(--text-muted); }
  .hole-nav { display: flex; gap: 8px; }
  .nav-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(255,255,255,.2); background: transparent; color: var(--text); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .nav-btn:active { background: var(--card); }
  .nav-btn.finish { background: var(--gold); color: var(--dark); border-color: var(--gold); font-size: 14px; font-weight: 600; width: auto; padding: 0 14px; border-radius: 20px; font-family: 'DM Sans', sans-serif; }

  /* ── SCORE STEPPER ── */
  .score-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,.06); }
  .score-row:last-child { border-bottom: none; }
  .score-player { flex: 1; }
  .score-name { font-size: 14px; font-weight: 500; }
  .score-running { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .stepper { display: flex; align-items: center; gap: 0; }
  .step-btn { width: 44px; height: 44px; border-radius: 50%; border: none; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 300; transition: transform .1s; }
  .step-btn:active { transform: scale(.9); }
  .step-minus { background: var(--card2); color: var(--text); }
  .step-plus { background: var(--green); color: white; }
  .step-val { width: 52px; text-align: center; font-size: 26px; font-weight: 600; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }
  .step-val.eagle { color: #e8c97a; }
  .step-val.birdie { color: #5dbb7a; }
  .step-val.par-score { color: var(--text); }
  .step-val.bogey { color: #e07b3a; }
  .step-val.double { color: var(--red); }
  .step-val.worse { color: #8b2020; }
  .score-pts { width: 32px; text-align: right; font-size: 14px; font-weight: 600; color: var(--gold); }

  /* ── PROGRESS BAR ── */
  .progress-bar { height: 3px; background: var(--card); flex-shrink: 0; }
  .progress-fill { height: 100%; background: var(--gold); transition: width .3s ease; }

  /* ── LEADERBOARD ── */
  .lb-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,.06); }
  .lb-pos { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--text-muted); width: 28px; }
  .lb-pos.gold { color: var(--gold); }
  .lb-pos.silver { color: #aaa; }
  .lb-pos.bronze { color: #cd7f32; }
  .lb-name { flex: 1; font-size: 16px; font-weight: 500; }
  .lb-scores { text-align: right; }
  .lb-main { font-size: 20px; font-weight: 600; }
  .lb-sub { font-size: 12px; color: var(--text-muted); }
  .lb-thru { font-size: 11px; color: var(--text-muted); margin-left: 8px; }

  /* ── SCORECARD TABLE ── */
  .sc-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .sc-table { border-collapse: collapse; width: 100%; min-width: 520px; font-size: 13px; }
  .sc-table th { background: var(--green-dark); color: var(--gold); font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; font-size: 13px; padding: 8px 10px; text-align: center; font-weight: 400; }
  .sc-table th.left { text-align: left; padding-left: 14px; }
  .sc-table td { padding: 9px 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,.05); }
  .sc-table td.left { text-align: left; padding-left: 14px; font-weight: 500; }
  .sc-table tr:nth-child(even) td { background: rgba(255,255,255,.02); }
  .sc-table .tot-row td { background: var(--card2); font-weight: 600; border-top: 1px solid var(--gold); color: var(--gold); }
  .sc-table .sub-row td { background: var(--card); font-weight: 600; color: var(--text-muted); font-size: 12px; }
  .cell-eagle { background: rgba(232,201,122,.25) !important; color: var(--gold); font-weight: 700; }
  .cell-birdie { background: rgba(93,187,122,.2) !important; color: #5dbb7a; font-weight: 700; }
  .cell-bogey { background: rgba(224,123,58,.15) !important; color: #e07b3a; }
  .cell-double { background: rgba(192,57,43,.2) !important; color: var(--red); }

  /* ── HISTORY ── */
  .hist-card { background: var(--card); border-radius: var(--r); padding: 14px 16px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,.06); cursor: pointer; }
  .hist-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .hist-course { font-size: 16px; font-weight: 600; }
  .hist-date { font-size: 12px; color: var(--text-muted); }
  .hist-players { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
  .hist-winner { font-size: 13px; color: var(--gold); margin-top: 4px; }

  /* ── TABS ── */
  .tabs { display: flex; background: var(--card); border-radius: 10px; padding: 4px; margin-bottom: 16px; }
  .tab { flex: 1; padding: 8px; text-align: center; border-radius: 7px; font-size: 13px; cursor: pointer; transition: all .15s; color: var(--text-muted); }
  .tab.active { background: var(--green); color: white; font-weight: 500; }

  /* ── SETUP WIZARD STEPS ── */
  .step-indicator { display: flex; gap: 6px; justify-content: center; margin-bottom: 20px; }
  .step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--card2); }
  .step-dot.done { background: var(--gold); }
  .step-dot.active { background: var(--green-light); }

  /* ── MISC ── */
  .divider { height: 1px; background: rgba(255,255,255,.07); margin: 16px 0; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .badge-green { background: rgba(45,150,83,.3); color: #5dbb7a; }
  .badge-gold { background: rgba(201,168,76,.25); color: var(--gold); }
  .add-course-link { text-align: center; padding: 16px; font-size: 14px; color: var(--green-light); cursor: pointer; }
  .hole-si { font-size: 10px; color: var(--text-muted); }
  .stroke-indicator { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--gold); margin-left: 4px; vertical-align: middle; }

  /* ── RESULTS ── */
  .podium { display: flex; align-items: flex-end; justify-content: center; gap: 8px; padding: 20px 0; }
  .podium-col { text-align: center; }
  .podium-block { border-radius: 8px 8px 0 0; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--dark); }
  .p1 .podium-block { background: var(--gold); height: 80px; width: 90px; font-size: 36px; }
  .p2 .podium-block { background: #aaa; height: 60px; width: 75px; }
  .p3 .podium-block { background: #cd7f32; height: 45px; width: 75px; }
  .podium-name { font-size: 12px; color: var(--text-muted); margin-top: 6px; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .podium-score { font-size: 15px; font-weight: 600; }

  /* ── EXPORT ── */
  .export-row { display: flex; gap: 10px; }
  .export-row .home-btn { flex: 1; padding: 12px; font-size: 14px; }

  /* ── FLOATING FINISH ── */
  .float-finish { position: sticky; bottom: 0; background: linear-gradient(to top, var(--dark) 60%, transparent); padding: 12px 16px 16px; margin-top: 8px; }

  /* ── MODAL ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 100; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--mid); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-height: 80vh; overflow-y: auto; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--gold); margin-bottom: 16px; letter-spacing: 1px; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<!-- ═══════════════════════════════ HOME ═══════════════════════════════ -->
<div id="s-home" class="screen active">
  <div class="hdr">
    <div>
      <div class="hdr-title">⛳ GolfMate</div>
      <div class="hdr-sub">Sydney Courses</div>
    </div>
  </div>
  <div class="body">
    <div class="home-hero">
      <div class="home-logo">GolfMate</div>
      <div class="home-tagline">Score · Stableford · Match · Net</div>
    </div>

    <button class="home-btn btn-gold" onclick="startSetup()">+ New Round</button>

    <div class="section-label">Recent Rounds</div>
    <div id="history-preview"></div>
    <div id="history-empty" style="display:none" class="empty-state">
      <div class="empty-icon">🏌️</div>
      <div>No rounds yet.<br>Tee it up!</div>
    </div>

    <button class="home-btn btn-secondary" onclick="showScreen('s-history')">View All History</button>
    <button class="home-btn btn-secondary" onclick="showScreen('s-courses')">Manage Courses</button>
  </div>
</div>

<!-- ═══════════════════════════════ SETUP ═══════════════════════════════ -->
<div id="s-setup" class="screen">
  <div class="hdr">
    <div>
      <div class="hdr-title">New Round</div>
      <div class="hdr-sub" id="setup-step-label">Step 1 of 4</div>
    </div>
    <button class="back-btn" onclick="showScreen('s-home')">Cancel</button>
  </div>
  <div class="body">
    <div class="step-indicator" id="step-dots"></div>
    <div id="setup-content"></div>
  </div>
</div>

<!-- ═══════════════════════════════ SCORING ═══════════════════════════════ -->
<div id="s-scoring" class="screen">
  <div class="hole-header">
    <div class="hole-info">
      <div class="hole-num" id="sc-hole-num">HOLE 1</div>
      <div class="hole-meta" id="sc-hole-meta">Par 4 · SI 3</div>
    </div>
    <div class="hole-nav">
      <button class="nav-btn" onclick="prevHole()">‹</button>
      <button class="nav-btn" onclick="nextHole()">›</button>
      <button class="nav-btn finish" onclick="confirmFinish()" id="finish-btn">Done</button>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="sc-progress"></div></div>
  <div class="body" id="sc-body"></div>
</div>

<!-- ═══════════════════════════════ RESULTS ═══════════════════════════════ -->
<div id="s-results" class="screen">
  <div class="hdr">
    <div>
      <div class="hdr-title">Results</div>
      <div class="hdr-sub" id="res-subtitle"></div>
    </div>
    <button class="back-btn" onclick="showScreen('s-home')">Home</button>
  </div>
  <div class="body">
    <div id="res-podium"></div>
    <div class="tabs" id="res-tabs">
      <div class="tab active" onclick="resTab(0)">Leaderboard</div>
      <div class="tab" onclick="resTab(1)">Scorecard</div>
    </div>
    <div id="res-tab-0"></div>
    <div id="res-tab-1" style="display:none"></div>
    <div class="divider"></div>
    <div class="export-row">
      <button class="home-btn btn-secondary" onclick="exportCSV()">Export CSV</button>
      <button class="home-btn btn-gold" onclick="saveRound()">Save Round</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════ HISTORY ═══════════════════════════════ -->
<div id="s-history" class="screen">
  <div class="hdr">
    <div><div class="hdr-title">Round History</div></div>
    <button class="back-btn" onclick="showScreen('s-home')">Back</button>
  </div>
  <div class="body" id="history-body"></div>
</div>

<!-- ═══════════════════════════════ COURSES ═══════════════════════════════ -->
<div id="s-courses" class="screen">
  <div class="hdr">
    <div><div class="hdr-title">Courses</div></div>
    <button class="back-btn" onclick="showScreen('s-home')">Back</button>
  </div>
  <div class="body" id="courses-body"></div>
</div>

<!-- ═══════════════════════════════ MODAL ═══════════════════════════════ -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-body"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// COURSE DATABASE
// ═══════════════════════════════════════════════════════════════
const BUILT_IN_COURSES = [
  {
    id: 'moore-park',
    name: 'Moore Park Golf',
    location: 'Moore Park, Sydney',
    holes: 18, par: 70,
    hole_data: [
      {par:4,si:3},{par:3,si:18},{par:4,si:10},{par:5,si:2},{par:3,si:12},{par:5,si:16},
      {par:3,si:6},{par:4,si:7},{par:4,si:14},{par:3,si:4},{par:5,si:13},{par:4,si:9},
      {par:3,si:5},{par:4,si:8},{par:3,si:11},{par:5,si:17},{par:4,si:15},{par:4,si:1}
    ]
  },
  {
    id: 'the-coast',
    name: 'The Coast Golf Club',
    location: 'Little Bay, Sydney',
    holes: 18, par: 70,
    hole_data: [
      {par:4,si:2},{par:5,si:18},{par:5,si:16},{par:3,si:13},{par:4,si:6},{par:5,si:9},
      {par:4,si:1},{par:3,si:14},{par:3,si:10},{par:4,si:11},{par:4,si:8},{par:3,si:15},
      {par:4,si:3},{par:4,si:4},{par:3,si:12},{par:4,si:7},{par:4,si:5},{par:4,si:17}
    ]
  },
  {
    id: 'st-michaels',
    name: "St Michael's Golf Club",
    location: 'Little Bay, Sydney',
    holes: 18, par: 72,
    hole_data: [
      {par:4,si:1},{par:4,si:4},{par:3,si:10},{par:4,si:8},{par:3,si:6},{par:5,si:16},
      {par:5,si:14},{par:4,si:12},{par:4,si:18},{par:4,si:7},{par:4,si:3},{par:3,si:13},
      {par:5,si:15},{par:4,si:17},{par:3,si:11},{par:4,si:5},{par:5,si:2},{par:4,si:9}
    ]
  },
  {
    id: 'eastlake',
    name: 'Eastlake Golf Club',
    location: 'Kingsford, Sydney',
    holes: 18, par: 72,
    hole_data: [
      {par:4,si:16},{par:4,si:11},{par:4,si:17},{par:5,si:6},{par:4,si:12},{par:4,si:3},
      {par:5,si:13},{par:4,si:1},{par:3,si:15},{par:4,si:14},{par:4,si:2},{par:5,si:4},
      {par:3,si:9},{par:4,si:18},{par:5,si:8},{par:3,si:10},{par:3,si:7},{par:4,si:5}
    ]
  },
  {
    id: 'woollahra',
    name: 'Woollahra Golf Club',
    location: 'Rose Bay, Sydney',
    holes: 9, par: 34,
    note: '9-hole course — plays twice for 18 holes',
    hole_data: [
      {par:4,si:13},{par:4,si:10},{par:4,si:1},{par:3,si:8},{par:4,si:15},
      {par:4,si:4},{par:4,si:12},{par:4,si:6},{par:3,si:18}
    ]
  }
];

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let round = null; // active round
let setupStep = 0;
let setupData = {};

function getCustomCourses() { try { return JSON.parse(localStorage.getItem('gm_courses') || '[]'); } catch(e) { return []; } }
function saveCustomCourses(arr) { localStorage.setItem('gm_courses', JSON.stringify(arr)); }
function getHistory() { try { return JSON.parse(localStorage.getItem('gm_history') || '[]'); } catch(e) { return []; } }
function saveHistory(arr) { localStorage.setItem('gm_history', JSON.stringify(arr)); }
function getAllCourses() { return [...BUILT_IN_COURSES, ...getCustomCourses()]; }

// ═══════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 's-home') renderHome();
  if (id === 's-history') renderHistory();
  if (id === 's-courses') renderCourses();
}

// ═══════════════════════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════════════════════
function renderHome() {
  const hist = getHistory();
  const preview = document.getElementById('history-preview');
  const empty = document.getElementById('history-empty');
  if (!hist.length) { preview.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';
  const recent = hist.slice(-3).reverse();
  preview.innerHTML = recent.map(r => histCard(r, true)).join('');
}

function histCard(r, compact=false) {
  const date = new Date(r.date).toLocaleDateString('en-AU', {day:'numeric',month:'short',year:'numeric'});
  const winner = getWinner(r);
  return `<div class="hist-card" onclick="viewRound('${r.id}')">
    <div class="hist-top">
      <div class="hist-course">${r.course}</div>
      <div class="hist-date">${date}</div>
    </div>
    <div class="hist-players">${r.players.map(p=>p.name).join(' · ')} · ${r.holes} holes</div>
    ${winner ? `<div class="hist-winner">🏆 ${winner}</div>` : ''}
  </div>`;
}

function getWinner(r) {
  if (!r.players.length) return null;
  const fmt = r.formats[0];
  if (fmt === 'stableford') {
    const best = r.players.reduce((a,b) => totalPts(b,r) > totalPts(a,r) ? b : a);
    return `${best.name} · ${totalPts(best,r)} pts`;
  }
  if (fmt === 'net') {
    const best = r.players.reduce((a,b) => netTotal(b,r) < netTotal(a,r) ? b : a);
    return `${best.name} · Net ${netTotal(best,r)}`;
  }
  if (fmt === 'gross') {
    const best = r.players.reduce((a,b) => grossTotal(b,r) < grossTotal(a,r) ? b : a);
    return `${best.name} · Gross ${grossTotal(best,r)}`;
  }
  return null;
}

const SETUP_STEPS = ['course', 'format', 'players', 'handicaps'];

function startSetup() {
  setupStep = 0;
  setupData = { courseId: null, numHoles: 18, formats: ['stableford'], players: [], date: new Date().toISOString().slice(0,10) };
  showScreen('s-setup');
  renderSetupStep();
}

function renderSetupStep() {
  const dots = document.getElementById('step-dots');
  dots.innerHTML = SETUP_STEPS.map((s,i) =>
    `<div class="step-dot ${i < setupStep ? 'done' : i === setupStep ? 'active' : ''}"></div>`
  ).join('');
  document.getElementById('setup-step-label').textContent = `Step ${setupStep+1} of ${SETUP_STEPS.length}`;
  const content = document.getElementById('setup-content');

  if (setupStep === 0) renderCourseStep(content);
  else if (setupStep === 1) renderFormatStep(content);
  else if (setupStep === 2) renderPlayersStep(content);

}

function renderCourseStep(el) {
  const courses = getAllCourses();
  el.innerHTML = `
    <div class="section-label">Select Course</div>
    <div class="field">

      <input type="date" id="inp-date" value="${setupData.date}">
    </div>
    ${courses.map(c => `
      <div class="card" style="cursor:pointer;border-color:${setupData.courseId===c.id?'var(--green)':'rgba(255,255,255,.06)'}" onclick="selectCourse('${c.id}')">
        <div style="display:flex;justify-content:space-between;align-items:center">

            <div style="font-size:15px;font-weight:600">${c.name}</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${c.location} · Par ${c.par} · ${c.holes} holes</div>
            ${c.note ? `<div style="font-size:11px;color:var(--gold);margin-top:2px">${c.note}</div>` : ''}
          </div>
          ${setupData.courseId===c.id ? '<span style="color:var(--green-light);font-size:20px">✓</span>' : ''}
        </div>

    <div class="add-course-link" onclick="showAddCourse()">+ Add custom course</div>
    ${setupData.courseId ? `<button class="home-btn btn-primary" onclick="setupNext()" style="margin-top:8px">Continue →</button>` : ''}

function selectCourse(id) {
  setupData.courseId = id;

  if (course.holes === 9) {
    setupData.numHoles = 9; // default, can be changed

function renderFormatStep(el) {
  const course = getAllCourses().find(c => c.id === setupData.courseId);
  const holesOpts = course.holes === 9
    ? `<div class="pills" id="holes-pills">
        <button class="pill ${setupData.numHoles===9?'active':''}" onclick="setHoles(9)">9 Holes</button>

      </div>`
    : `<div class="pills" id="holes-pills">
        <button class="pill ${setupData.numHoles===9?'active':''}" onclick="setHoles(9)">9 Holes (Front)</button>
        <button class="pill ${setupData.numHoles===18?'active':''}" onclick="setHoles(18)">18 Holes</button>
      </div>`;

  el.innerHTML = `

    <div class="field">

function toggleFormat(f) {

function renderPlayersStep(el) {

function addPlayer() { setupData.players.push({name:'',hcp:0}); renderSetupStep(); }
function removePlayer(i) { setupData.players.splice(i,1); renderSetupStep(); }

function renderHandicapsStep(el) {
  el.innerHTML = `
    <div class="section-label">Handicaps</div>
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:14px">Enter playing handicap (GA handicap × course slope factor if known)</div>
    ${setupData.players.map((p,i) => `
      <div class="card">

function setupNext() {
  if (setupStep === 0) setupData.date = document.getElementById('inp-date')?.value || setupData.date;
  if (setupStep === 0 && !setupData.courseId) return alert('Please select a course');
  if (setupStep === 1 && !setupData.formats.length) return alert('Select at least one format');
  if (setupStep === 2) {
    const names = setupData.players.map(p=>p.name.trim()).filter(Boolean);
    if (!names.length) return alert('Add at least one player');
    setupData.players = setupData.players.filter(p=>p.name.trim());
  }
  setupStep++;
  renderSetupStep();
}
function setupBack() { if (setupStep > 0) { setupStep--; renderSetupStep(); } }

// ═══════════════════════════════════════════════════════════════
// ROUND LOGIC
// ═══════════════════════════════════════════════════════════════
function buildHoleList(course, numHoles) {
  const base = course.hole_data;
  if (numHoles <= base.length) return base.slice(0, numHoles).map((h,i) => ({...h, holeNum: i+1}));
  // 9-hole course played twice
  const second = base.map((h,i) => ({...h, holeNum: i+10}));
  return [...base.map((h,i) => ({...h, holeNum:i+1})), ...second];
}

function startRound() {
  const course = getAllCourses().find(c => c.id === setupData.courseId);
  const holes = buildHoleList(course, setupData.numHoles);
  round = {
    id: Date.now().toString(),
    date: setupData.date,
    course: course.name,
    courseId: setupData.courseId,
    holes: setupData.numHoles,
    formats: setupData.formats,
    players: setupData.players.map(p => ({
      ...p,
      hcp: Math.round(parseFloat(p.hcp) || 0),
      scores: Array(holes.length).fill(0)
    })),
    holeData: holes,
    currentHole: 0,
    saved: false
  };
  showScreen('s-scoring');
  renderScoringHole();
}

// ═══════════════════════════════════════════════════════════════
// SCORING SCREEN
// ═══════════════════════════════════════════════════════════════
function renderScoringHole() {
  const h = round.holeData[round.currentHole];
  document.getElementById('sc-hole-num').textContent = `HOLE ${h.holeNum}`;
  document.getElementById('sc-hole-meta').textContent = `Par ${h.par} · SI ${h.si}`;

  const pct = ((round.currentHole + 1) / round.holeData.length) * 100;
  document.getElementById('sc-progress').style.width = pct + '%';

  const isLast = round.currentHole === round.holeData.length - 1;
  document.getElementById('finish-btn').textContent = isLast ? 'Finish' : 'Done';

  const body = document.getElementById('sc-body');
  body.innerHTML = `
    <div style="margin-bottom:12px">
      ${round.players.map((p, pi) => {
        const score = p.scores[round.currentHole] || h.par;
        const strokes = strokesOnHole(p.hcp, h.si, round.holeData.length);
        const netPar = h.par + strokes;
        const pts = stablefordPts(score, h.par, strokes);
        const diff = score - h.par;
        let cls = 'par-score';
        if (diff <= -2) cls = 'eagle';
        else if (diff === -1) cls = 'birdie';
        else if (diff === 1) cls = 'bogey';
        else if (diff === 2) cls = 'double';
        else if (diff > 2) cls = 'worse';
        return `
          <div class="score-row">
            <div class="score-player">
              <div class="score-name">${p.name}${strokes > 0 ? `<span class="stroke-indicator" title="${strokes} stroke(s)"></span>` : ''}</div>
              <div class="score-running">${runningInfo(p, pi)}</div>
            </div>
            <div class="stepper">
              <button class="step-btn step-minus" onclick="adjustScore(${pi}, -1)">−</button>
              <div class="step-val ${cls}" id="sv-${pi}">${score}</div>
              <button class="step-btn step-plus" onclick="adjustScore(${pi}, 1)">+</button>
            </div>
            ${round.formats.includes('stableford') ? `<div class="score-pts">${pts}pts</div>` : ''}
          </div>`;
      }).join('')}
    </div>
    <div style="padding:8px 0;font-size:12px;color:var(--text-muted);text-align:center">
      Hole ${round.currentHole+1} of ${round.holeData.length} · ${round.course}
    </div>
    ${renderRunningSummary()}
  `;
  // init scores to par if not set
  round.players.forEach((p, pi) => {
    if (!p.scores[round.currentHole]) p.scores[round.currentHole] = h.par;
  });
}

function renderRunningSummary() {
  const r = round;
  const holesPlayed = r.currentHole + 1;
  const parSoFar = r.holeData.slice(0, holesPlayed).reduce((a, h) => a + h.par, 0);
  const totalPar = r.holeData.reduce((a, h) => a + h.par, 0);
  const hasStableford = r.formats.includes('stableford');
  const hasNet = r.formats.includes('net') || r.formats.includes('stableford');

  // Sort players by primary format for ranking
  const fmt = r.formats[0];
  const ranked = r.players.map((p, pi) => {
    const gross = r.holeData.slice(0, holesPlayed).reduce((a, h, i) => a + (p.scores[i] || 0), 0);
    const pts = r.holeData.slice(0, holesPlayed).reduce((acc, h, i) =>
      acc + stablefordPts(p.scores[i] || 0, h.par, strokesOnHole(p.hcp, h.si, r.holeData.length)), 0);
    const grossDiff = gross - parSoFar;
    return { p, pi, gross, pts, grossDiff };
  }).sort((a, b) => fmt === 'stableford' ? b.pts - a.pts : a.gross - b.gross);

  const cols = hasStableford
    ? `<div style="display:grid;grid-template-columns:1fr auto auto;gap:0;width:100%">
        <div style="font-size:10px;color:var(--text-muted);padding:0 10px 4px">Player</div>
        <div style="font-size:10px;color:var(--text-muted);padding:0 10px 4px;text-align:right">Gross</div>
        <div style="font-size:10px;color:var(--gold);padding:0 10px 4px;text-align:right">Pts</div>
        ${ranked.map(({p, gross, pts, grossDiff}, rank) => {
          const diffStr = grossDiff === 0 ? 'E' : grossDiff > 0 ? `+${grossDiff}` : `${grossDiff}`;
          const initials = p.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
          return `
            <div style="padding:6px 10px;display:flex;align-items:center;gap:6px;border-top:1px solid rgba(255,255,255,.05)">
              <span style="font-size:11px;color:var(--text-muted);width:14px">${rank+1}</span>
              <span style="width:26px;height:26px;border-radius:50%;background:var(--green-dark);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--gold);flex-shrink:0">${initials}</span>
              <span style="font-size:14px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</span>
            </div>
            <div style="padding:6px 10px;text-align:right;border-top:1px solid rgba(255,255,255,.05);font-size:14px;color:${grossDiff>0?'var(--red)':grossDiff<0?'#5dbb7a':'var(--text)'}">${diffStr}</div>
            <div style="padding:6px 10px;text-align:right;border-top:1px solid rgba(255,255,255,.05);font-size:16px;font-weight:700;color:var(--gold)">${pts}</div>
          `;
        }).join('')}
      </div>`
    : `<div style="display:grid;grid-template-columns:1fr auto;gap:0;width:100%">
        <div style="font-size:10px;color:var(--text-muted);padding:0 10px 4px">Player</div>
        <div style="font-size:10px;color:var(--text-muted);padding:0 10px 4px;text-align:right">vs Par</div>
        ${ranked.map(({p, gross, grossDiff}, rank) => {
          const diffStr = grossDiff === 0 ? 'E' : grossDiff > 0 ? `+${grossDiff}` : `${grossDiff}`;
          const initials = p.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
          return `
            <div style="padding:6px 10px;display:flex;align-items:center;gap:6px;border-top:1px solid rgba(255,255,255,.05)">
              <span style="font-size:11px;color:var(--text-muted);width:14px">${rank+1}</span>
              <span style="width:26px;height:26px;border-radius:50%;background:var(--green-dark);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--gold);flex-shrink:0">${initials}</span>
              <span style="font-size:14px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</span>
            </div>
            <div style="padding:6px 10px;text-align:right;border-top:1px solid rgba(255,255,255,.05);font-size:16px;font-weight:700;color:${grossDiff>0?'var(--red)':grossDiff<0?'#5dbb7a':'var(--text)'}">${diffStr}</div>
          `;
        }).join('')}
      </div>`;

  return `
    <div style="background:var(--card);border-radius:var(--r);border:1px solid rgba(201,168,76,.2);margin-top:4px;overflow:hidden">
      <div style="background:var(--green-dark);padding:8px 10px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;color:var(--gold)">RUNNING TOTALS</span>
        <span style="font-size:11px;color:var(--text-muted)">Thru ${holesPlayed} · Par ${parSoFar}/${totalPar}</span>
      </div>
      ${cols}
    </div>
  `;
}

function runningInfo(p, pi) {
  const played = p.scores.filter(s => s > 0).length;
  if (!played) return 'Not started';
  const gross = p.scores.slice(0, round.currentHole+1).filter(s=>s>0).reduce((a,b)=>a+b,0);
  const parPlayed = round.holeData.slice(0, round.currentHole+1).reduce((a,h)=>a+h.par,0);
  const diff = gross - parPlayed;
  const diffStr = diff === 0 ? 'E' : diff > 0 ? `+${diff}` : `${diff}`;
  const pts = round.holeData.slice(0, round.currentHole+1).reduce((acc, h, i) => {
    return acc + stablefordPts(p.scores[i]||0, h.par, strokesOnHole(p.hcp, h.si, round.holeData.length));
  }, 0);
  if (round.formats.includes('stableford')) return `Gross ${diffStr} · ${pts}pts`;
  return `Gross ${diffStr}`;
}

function adjustScore(pi, delta) {
  const h = round.holeData[round.currentHole];
  const p = round.players[pi];
  let s = (p.scores[round.currentHole] || h.par) + delta;
  s = Math.max(1, Math.min(15, s));
  p.scores[round.currentHole] = s;
  renderScoringHole();
}

function strokesOnHole(hcp, si, totalHoles) {
  if (!hcp || hcp <= 0) return 0;
  const base = Math.floor(hcp / totalHoles);
  const extra = hcp % totalHoles;
  return base + (si <= extra ? 1 : 0);
}

function stablefordPts(score, par, strokes) {
  if (!score) return 0;
  const net = score - par - strokes;
  if (net <= -2) return 4;
  if (net === -1) return 3;
  if (net === 0) return 2;
  if (net === 1) return 1;
  return 0;
}

function prevHole() {
  if (round.currentHole > 0) { round.currentHole--; renderScoringHole(); }
}

function nextHole() {
  if (round.currentHole < round.holeData.length - 1) { round.currentHole++; renderScoringHole(); }
}

function confirmFinish() {
  const isLast = round.currentHole === round.holeData.length - 1;
  if (!isLast) { nextHole(); return; }
  // check for missing scores
  const missing = round.players.some(p => p.scores.some(s => !s));
  if (missing) {
    if (!confirm('Some holes have no score (showing 0). Finish anyway?')) return;
  }
  showResults();
}

// ═══════════════════════════════════════════════════════════════
// RESULTS
// ═══════════════════════════════════════════════════════════════
function grossTotal(p, r) { return p.scores.reduce((a,b)=>a+(b||0),0); }
function netTotal(p, r) { return grossTotal(p,r) - p.hcp; }
function totalPts(p, r) {
  return r.holeData.reduce((acc,h,i) =>
    acc + stablefordPts(p.scores[i]||0, h.par, strokesOnHole(p.hcp, h.si, r.holeData.length)), 0);
}
function parTotal(r) { return r.holeData.reduce((a,h)=>a+h.par,0); }

function showResults() {
  showScreen('s-results');
  const r = round;
  document.getElementById('res-subtitle').textContent = `${r.course} · ${r.holes} holes · ${new Date(r.date).toLocaleDateString('en-AU',{day:'numeric',month:'short'})}`;

  // Sort by primary format
  const fmt = r.formats[0];
  let sorted = [...r.players].map(p => ({...p, _gross: grossTotal(p,r), _net: netTotal(p,r), _pts: totalPts(p,r)}));
  if (fmt === 'stableford') sorted.sort((a,b) => b._pts - a._pts);
  else sorted.sort((a,b) => a._net - b._net);

  // Podium
  const podium = document.getElementById('res-podium');
  if (sorted.length >= 2) {
    const order = sorted.length >= 3 ? [sorted[1], sorted[0], sorted[2]] : [sorted[0], sorted[1]];
    const classes = sorted.length >= 3 ? ['p2','p1','p3'] : ['p1','p2'];
    podium.innerHTML = `<div class="podium">${order.map((p,i) => `
      <div class="podium-col ${classes[i]}">
        <div class="podium-block">${classes[i]==='p1'?'1':classes[i]==='p2'?'2':'3'}</div>
        <div class="podium-name">${p.name}</div>
        <div class="podium-score">${fmt==='stableford' ? p._pts+'pts' : 'Net '+p._net}</div>
      </div>`).join('')}</div>`;
  } else { podium.innerHTML = ''; }

  renderResTab(0);
}

function resTab(idx) {
  document.querySelectorAll('#res-tabs .tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.getElementById('res-tab-0').style.display = idx===0 ? '' : 'none';
  document.getElementById('res-tab-1').style.display = idx===1 ? '' : 'none';
  renderResTab(idx);
}

function renderResTab(idx) {
  if (idx === 0) renderLeaderboard();
  else renderScorecardView();
}

function renderLeaderboard() {
  const r = round;
  const fmt = r.formats[0];
  let sorted = [...r.players].map(p => ({...p, _gross: grossTotal(p,r), _net: netTotal(p,r), _pts: totalPts(p,r)}));
  if (fmt === 'stableford') sorted.sort((a,b) => b._pts - a._pts);
  else sorted.sort((a,b) => a._net - b._net);

  const parTot = parTotal(r);
  const posClasses = ['gold','silver','bronze'];
  document.getElementById('res-tab-0').innerHTML = sorted.map((p,i) => {
    const grossDiff = p._gross - parTot;
    const grossStr = grossDiff === 0 ? 'E' : grossDiff > 0 ? `+${grossDiff}` : `${grossDiff}`;
    let main, sub;
    if (fmt === 'stableford') { main = `${p._pts} pts`; sub = `Gross ${grossStr} · Net ${p._net}`; }
    else if (fmt === 'net') { main = `Net ${p._net}`; sub = `Gross ${p._gross} · HCP ${p.hcp}`; }
    else { main = `Gross ${p._gross}`; sub = grossStr; }
    if (r.formats.includes('stableford') && fmt !== 'stableford') sub += ` · ${p._pts}pts`;
    return `<div class="lb-row">
      <div class="lb-pos ${posClasses[i]||''}">${i+1}</div>
      <div>
        <div class="lb-name">${p.name}</div>
        <div style="font-size:12px;color:var(--text-muted)">HCP ${p.hcp}</div>
      </div>
      <div class="lb-scores">
        <div class="lb-main">${main}</div>
        <div class="lb-sub">${sub}</div>
      </div>
    </div>`;
  }).join('');
}

function renderScorecardView() {
  const r = round;
  const parTot = parTotal(r);
  let html = `<div class="sc-wrap"><table class="sc-table">
    <thead><tr>
      <th class="left">Hole</th>
      ${r.holeData.map(h=>`<th>${h.holeNum}</th>`).join('')}
      <th>TOT</th>
    </tr>
    <tr>
      <th class="left" style="font-size:11px">Par</th>
      ${r.holeData.map(h=>`<th style="font-size:11px">${h.par}</th>`).join('')}
      <th style="font-size:11px">${parTot}</th>
    </tr>
    <tr>
      <th class="left" style="font-size:11px">SI</th>
      ${r.holeData.map(h=>`<th style="font-size:11px">${h.si}</th>`).join('')}
      <th></th>
    </tr></thead>
    <tbody>`;
  r.players.forEach(p => {
    const gross = grossTotal(p,r);
    html += `<tr>
      <td class="left">${p.name}<br><span class="hole-si">HC${p.hcp}</span></td>
      ${r.holeData.map((h,i) => {
        const s = p.scores[i] || 0;
        const diff = s - h.par;
        const strokes = strokesOnHole(p.hcp, h.si, r.holeData.length);
        let cls = '';
        if (diff <= -2) cls = 'cell-eagle';
        else if (diff === -1) cls = 'cell-birdie';
        else if (diff === 1) cls = 'cell-bogey';
        else if (diff >= 2) cls = 'cell-double';
        return `<td class="${cls}">${s||'–'}${strokes>0?'•':''}</td>`;
      }).join('')}
      <td style="font-weight:700">${gross}</td>
    </tr>`;
    if (r.formats.includes('stableford')) {
      const pts = r.holeData.map((h,i) => stablefordPts(p.scores[i]||0, h.par, strokesOnHole(p.hcp, h.si, r.holeData.length)));
      const totalP = pts.reduce((a,b)=>a+b,0);
      html += `<tr class="sub-row"><td class="left" style="font-size:11px">Pts</td>
        ${pts.map(pt=>`<td>${pt}</td>`).join('')}
        <td style="font-weight:700;color:var(--gold)">${totalP}</td></tr>`;
    }
  });
  html += `</tbody></table></div>`;
  document.getElementById('res-tab-1').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
// SAVE & EXPORT
// ═══════════════════════════════════════════════════════════════
function saveRound() {
  if (round.saved) { alert('Round already saved!'); return; }
  const hist = getHistory();
  hist.push({...round, saved: true});
  saveHistory(hist);
  round.saved = true;
  alert('Round saved! ✓');
}

function exportCSV() {
  const r = round;
  let csv = `GolfMate Export\n`;
  csv += `Course,${r.course}\n`;
  csv += `Date,${r.date}\n`;
  csv += `Format,${r.formats.map(fmtLabel).join(' + ')}\n`;
  csv += `Holes,${r.holes}\n\n`;
  csv += `Hole,Par,SI,${r.players.map(p=>p.name).join(',')}\n`;
  r.holeData.forEach((h,i) => {
    csv += `${h.holeNum},${h.par},${h.si},${r.players.map(p=>p.scores[i]||0).join(',')}\n`;
  });
  csv += `\nTotals\n`;
  csv += `,,Gross,${r.players.map(p=>grossTotal(p,r)).join(',')}\n`;
  csv += `,,Net,${r.players.map(p=>netTotal(p,r)).join(',')}\n`;
  if (r.formats.includes('stableford'))
    csv += `,,Stableford Pts,${r.players.map(p=>totalPts(p,r)).join(',')}\n`;
  csv += `\nHandicaps,,, ${r.players.map(p=>p.hcp).join(',')}\n`;

  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `GolfMate_${r.course.replace(/\s+/g,'_')}_${r.date}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function renderHistory() {
  const hist = getHistory().reverse();
  const body = document.getElementById('history-body');
  if (!hist.length) {
    body.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div>No saved rounds yet.</div></div>`;
    return;
  }
  body.innerHTML = hist.map(r => histCard(r)).join('');
}

function viewRound(id) {
  const r = getHistory().find(r => r.id === id);
  if (!r) return;
  round = r;
  showResults();
}

    {par:3,si:17},{par:5,si:5},{par:4,si:13},{par:4,si:6},{par:4,si:2},{par:3,si:16},
    {par:5,si:8},{par:4,si:4},{par:3,si:18},{par:4,si:10},{par:5,si:12},{par:4,si:14}]},
  { name:'Brookwater Golf Club', location:'Springfield, Brisbane', holes:18, hole_data:[
    {par:5,si:3},{par:4,si:11},{par:4,si:7},{par:3,si:15},{par:4,si:1},{par:4,si:9},
    {par:3,si:17},{par:5,si:5},{par:4,si:13},{par:4,si:6},{par:4,si:2},{par:3,si:16},
    {par:5,si:8},{par:4,si:4},{par:3,si:18},{par:4,si:10},{par:5,si:12},{par:4,si:14}]},
];

function searchCourse() {
  const query = document.getElementById('nc-search').value.trim().toLowerCase();
  if (!query) return;
  const status = document.getElementById('nc-search-status');
  const results = document.getElementById('nc-search-results');
  results.innerHTML = '';

  const allSearchable = [...COURSE_DB, ...getCustomCourses()];
  const tokens = query.split(/\s+/).filter(t => t.length > 1);
  const scored = allSearchable.map(c => {
    const haystack = (c.name + ' ' + c.location).toLowerCase();
    let score = 0;
    tokens.forEach(t => { if (haystack.includes(t)) score += t.length; });
    if (haystack.includes(query)) score += 20;
    return { c, score };
  }).filter(x => x.score > 0).sort((a,b) => b.score - a.score).slice(0, 5);

  if (!scored.length) {
    status.innerHTML = `<span style="color:var(--text-muted)">No matches — try a shorter name (e.g. "Royal Sydney") or add manually.</span>`;
    return;
  }

  status.innerHTML = `<span style="color:#5dbb7a">✓ ${scored.length} match${scored.length>1?'es':''} found — tap to preview</span>`;
  window._searchResults = scored.map(x => x.c);
  results.innerHTML = window._searchResults.map((c, i) => {
    const par = c.hole_data.reduce((a,h)=>a+h.par,0);
    return `<div class="card" style="cursor:pointer;margin-bottom:8px" onclick="previewCourse(${i})">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:15px;font-weight:600">${c.name}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${c.location} · Par ${par} · ${c.holes} holes</div>
        </div>
        <span style="color:var(--green-light);font-size:22px;padding-left:8px">›</span>
      </div>
    </div>`;
  }).join('');
}

function previewCourse(idx) {
  const c = window._searchResults[idx];
  const par = c.hole_data.reduce((a,h)=>a+h.par,0);
  const front = c.hole_data.slice(0, Math.min(9, c.holes));
  const back = c.holes > 9 ? c.hole_data.slice(9) : [];

  const holeTable = (holes, label, startNum) => `
    <div style="font-size:10px;color:var(--text-muted);margin:8px 0 4px;text-transform:uppercase;letter-spacing:1px">${label}</div>
    <div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%;font-size:13px">
      <tr style="background:var(--green-dark)">
        <td style="padding:4px 6px;color:var(--gold);font-family:'Bebas Neue',sans-serif;font-size:12px">Hole</td>
        ${holes.map((h,i)=>`<td style="padding:4px 4px;text-align:center;color:var(--gold);font-family:'Bebas Neue',sans-serif;font-size:12px">${startNum+i}</td>`).join('')}
        <td style="padding:4px 6px;text-align:center;color:var(--gold);font-size:12px">Tot</td>
      </tr>
      <tr>
        <td style="padding:4px 6px;color:var(--text-muted);font-size:11px">Par</td>
        ${holes.map(h=>`<td style="padding:4px 4px;text-align:center">${h.par}</td>`).join('')}
        <td style="padding:4px 6px;text-align:center;font-weight:600">${holes.reduce((a,h)=>a+h.par,0)}</td>
      </tr>
      <tr style="background:rgba(255,255,255,.03)">
        <td style="padding:4px 6px;color:var(--text-muted);font-size:11px">SI</td>
        ${holes.map(h=>`<td style="padding:4px 4px;text-align:center;color:var(--text-muted)">${h.si}</td>`).join('')}
        <td></td>
      </tr>
    </table></div>`;

  document.getElementById('nc-search-results').innerHTML = `
    <div style="background:var(--card2);border-radius:var(--r);padding:14px;border:1px solid rgba(201,168,76,.2);margin-bottom:10px">
      <div style="font-size:16px;font-weight:600">${c.name}</div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">${c.location} · Par ${par} · ${c.holes} holes</div>
      ${holeTable(front, 'Front 9', 1)}
      ${back.length ? holeTable(back, 'Back 9', 10) : ''}
    </div>
    <div style="font-size:11px;color:var(--text-muted);text-align:center;margin-bottom:10px">Always verify SI against the official scorecard</div>
    <button class="home-btn btn-gold" onclick="confirmCourse(${idx})">✓ Save This Course</button>
    <button class="home-btn btn-secondary" onclick="editCourse(${idx})">✏️ Edit Before Saving</button>
    <button class="home-btn btn-secondary" onclick="searchCourse()">← Back to Results</button>
  `;
  document.getElementById('nc-search-status').innerHTML = '';
}

function confirmCourse(idx) {
  const c = window._searchResults[idx];
  const par = c.hole_data.reduce((a,h)=>a+h.par,0);
  const course = { id:'custom-'+Date.now(), name:c.name, location:c.location, holes:c.holes, par, hole_data:c.hole_data };
  const arr = getCustomCourses();
  arr.push(course);
  saveCustomCourses(arr);
  closeModal();
  renderCourses();
  if (document.getElementById('s-setup').classList.contains('active')) renderSetupStep();
}

function confirmSearchResult(c) { confirmCourse(0); }

function editCourse(idx) {
  const c = window._searchResults[idx];
  showManualEntry(c.name, c.location, c.holes, c.hole_data);
}

function showManualEntry(name='', loc='', holes=18, existingData=null) {
  document.getElementById('nc-manual-section').style.display = '';
  document.getElementById('nc-search-results').innerHTML = '';
  document.getElementById('nc-search-status').innerHTML = '';
  const nameEl = document.getElementById('nc-name');
  const locEl = document.getElementById('nc-loc');
  if (nameEl && name) nameEl.value = name;
  if (locEl && loc) locEl.value = loc;
  window._ncHoles = holes;
  window._ncExistingData = existingData;
  renderCustomHoleFields(holes);
  // pre-fill if editing
  if (existingData) {
    setTimeout(() => {
      existingData.forEach((h,i) => {
        const parEl = document.getElementById(`nc-par-${i+1}`);
        const siEl = document.getElementById(`nc-si-${i+1}`);
        if (parEl) parEl.value = h.par;
        if (siEl) siEl.value = h.si;
      });
    }, 50);
  }
  // update pills
  document.querySelectorAll('#nc-manual-section .pill').forEach(p => {
    p.classList.toggle('active', parseInt(p.textContent) === holes);
  });
  document.getElementById('nc-manual-section').scrollIntoView({behavior:'smooth'});
}


function setModalHoles(n, btn) {
  window._ncHoles = n;
  btn.closest('.pills').querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderCustomHoleFields(n);
}

function renderCustomHoleFields(n) {
  const c = document.getElementById('nc-holes-container');
  if (!c) return;
  let html = `<div class="section-label">Par & Stroke Index per hole</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">`;
  for (let i = 1; i <= n; i++) {
    html += `<div style="background:var(--card2);border-radius:8px;padding:8px;text-align:center">
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">Hole ${i}</div>
      <div style="display:flex;gap:4px">
        <input type="number" id="nc-par-${i}" min="3" max="6" value="4"
          style="width:50%;background:var(--dark);border:1px solid rgba(255,255,255,.1);border-radius:4px;color:var(--text);text-align:center;padding:4px;font-size:14px">
        <input type="number" id="nc-si-${i}" min="1" max="${n}" value="${i}"
          style="width:50%;background:var(--dark);border:1px solid rgba(255,255,255,.1);border-radius:4px;color:var(--text);text-align:center;padding:4px;font-size:14px">
      </div>
      <div style="font-size:10px;color:var(--text-muted);margin-top:2px">Par / SI</div>
    </div>`;
  }
  html += '</div>';
  c.innerHTML = html;
}

function saveCustomCourse() {
  const name = document.getElementById('nc-name').value.trim();
  const loc = document.getElementById('nc-loc').value.trim();
  const n = window._ncHoles || 18;
  if (!name) { alert('Enter a course name'); return; }
  const hole_data = [];
  let par = 0;
  for (let i=1;i<=n;i++) {
    const p = parseInt(document.getElementById(`nc-par-${i}`).value) || 4;
    const si = parseInt(document.getElementById(`nc-si-${i}`).value) || i;
    hole_data.push({par:p, si:si});
    par += p;
  }
  const course = { id: 'custom-'+Date.now(), name, location:loc, holes:n, par, hole_data };
  const arr = getCustomCourses();
  arr.push(course);
  saveCustomCourses(arr);
  closeModal();
  renderCourses();
  // If we're in setup, refresh
  if (document.getElementById('s-setup').classList.contains('active')) renderSetupStep();
}

// ═══════════════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════════════
function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if (!e || e.target.id === 'modal-overlay') {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
renderHome();
</script>
